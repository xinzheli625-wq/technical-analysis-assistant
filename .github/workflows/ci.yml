name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DEEPSEEK_API_KEY: test-key-for-ci
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Smoke test imports
        env:
          DEEPSEEK_API_KEY: test-key-for-ci
        run: |
          python -c "import api, utils.data_source, utils.deterministic_pipeline, utils.feature_extractor; print('OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      # mypy 目前为建议性检查：代码库以动态 dict 结构为主，存量类型噪音较多，
      # 逐步收紧，不阻塞 CI。修复方向见 README「贡献与改进」。
      - name: Run mypy (advisory)
        continue-on-error: true
        run: mypy utils
